<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>えいたんごカード</title>
    <style>
        body {
            font-family: 'Helvetica Neue', Arial, 'Hiragino Kaku Gothic ProN', Meiryo, sans-serif;
            background-color: #f0f4f8;
            color: #333;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            margin: 0;
            padding: 15px;
            box-sizing: border-box;
            overflow-x: hidden;
        }
        h1 {
            font-size: 22px;
            color: #2c3e50;
            margin: 0 0 5px 0;
            text-align: center;
        }
        .progress {
            font-size: 14px;
            color: #7f8c8d;
            margin-bottom: 15px;
            text-align: center;
        }
        .card-container {
            width: 100%;
            max-width: 340px;
            height: 220px;
            -webkit-perspective: 1000px;
            perspective: 1000px;
            margin-bottom: 25px;
        }
        .card {
            width: 100%;
            height: 100%;
            position: relative;
            -webkit-transform-style: preserve-3d;
            transform-style: preserve-3d;
            -webkit-transition: -webkit-transform 0.4s;
            transition: transform 0.4s;
            cursor: pointer;
        }
        .card.flipped {
            -webkit-transform: rotateY(180deg);
            transform: rotateY(180deg);
        }
        .card-face {
            position: absolute;
            width: 100%;
            height: 100%;
            -webkit-backface-visibility: hidden;
            backface-visibility: hidden;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            border-radius: 15px;
            box-shadow: 0 8px 16px rgba(0,0,0,0.08);
            padding: 15px;
            box-sizing: border-box;
            background-color: #fff;
            border: 2px solid #e2e8f0;
        }
        .card-front {
            color: #2b6cb0;
        }
        
        /* 表面の文字エリア（英単語のみ表示） */
        .word-area {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            width: 100%;
            text-align: center;
        }
        
        .main-word {
            font-size: 32px;
            font-weight: bold;
            white-space: nowrap;
            text-align: center;
        }

        /* 裏面のデザイン（カードを裏返した時） */
        .card-back {
            background-color: #ebf8ff;
            -webkit-transform: rotateY(180deg);
            transform: rotateY(180deg);
            color: #2d3748;
        }
        
        /* 裏面上部の「よみがな」と「確認用スペル」を表示するエリア */
        .back-reading-area {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            margin-bottom: 8px;
            width: 100%;
        }
        
        /* 解答した後に表示されるカタカナ読み仮名 */
        .ruby-text-back {
            font-size: 13px;
            color: #4a5568;
            font-weight: normal;
            display: block;
            margin-bottom: 2px;
            letter-spacing: 0.5px;
            background-color: #cbd5e0;
            padding: 2px 8px;
            border-radius: 6px;
        }
        
        /* 裏面の英単語再確認用の文字 */
        .confirm-word-back {
            font-size: 18px;
            color: #718096;
            font-weight: bold;
            margin-bottom: 4px;
        }
        
        /* 裏面の仕切り線 */
        .divider {
            width: 40px;
            height: 2px;
            background-color: #a0aec0;
            margin: 6px 0 10px 0;
        }
        
        /* 裏面の日本語意味 */
        .meaning {
            font-size: 20px;
            font-weight: bold;
            text-align: center;
            word-break: break-all;
            color: #1a202c;
        }
        
        .hint {
            font-size: 11px;
            color: #a0aec0;
            margin-top: 15px;
        }
        
        .btn-container {
            display: flex;
            gap: 12px;
            width: 100%;
            max-width: 340px;
        }
        button {
            box-sizing: border-box;
            flex: 1;
            padding: 16px 10px;
            font-size: 16px;
            font-weight: bold;
            border: none;
            border-radius: 12px;
            cursor: pointer;
            box-shadow: 0 4px 6px rgba(0,0,0,0.05);
            -webkit-tap-highlight-color: transparent;
        }
        .btn-show { background-color: #4299e1; color: white; width: 100%; }
        .btn-yes { background-color: #48bb78; color: white; display: none; }
        .btn-no { background-color: #f56565; color: white; display: none; }
        
        .result-screen {
            display: none;
            text-align: center;
            background: white;
            padding: 30px 20px;
            border-radius: 15px;
            box-shadow: 0 8px 16px rgba(0,0,0,0.05);
            max-width: 340px;
            width: 100%;
            box-sizing: border-box;
        }
        .btn-retry { background-color: #ed8936; color: white; margin-top: 20px; width: 100%; flex: none; }
    </style>
</head>
<body>

    <div id="game-screen" style="display: flex; flex-direction: column; align-items: center; width: 100%;">
        <h1>えいたんごカード</h1>
        <div class="progress" id="progress">のこり: 100問 / ぜんぶで: 100問</div>

        <div class="card-container">
            <div class="card" id="card" onclick="flipCard();">
                <!-- 表面：英単語のみを中央に配置（読み仮名は解答前には見せない） -->
                <div class="card-face card-front">
                    <div class="word-area">
                        <div id="ruby-area" class="main-word">a</div>
                    </div>
                    <div class="hint">タップするか下のボタンで答えをみる</div>
                </div>
                <!-- 裏面：解答後にカタカナよみがな、英単語スペル、日本語訳がすべて表示される -->
                <div class="card-face card-back">
                    <div class="back-reading-area">
                        <div id="rt-area-back" class="ruby-text-back">ア</div>
                        <div id="word-confirm-back" class="confirm-word-back">a</div>
                    </div>
                    <div class="divider"></div>
                    <div class="meaning" id="word-back">1つの、ある</div>
                </div>
            </div>
        </div>

        <div class="btn-container">
            <button class="btn-show" id="btn-show" onclick="flipCard();">こたえをみる</button>
            <button class="btn-no" id="btn-no" onclick="handleAnswer(false);">まだおぼえてない</button>
            <button class="btn-yes" id="btn-yes" onclick="handleAnswer(true);">おぼえた！</button>
        </div>
    </div>

    <div class="result-screen" id="result-screen">
        <h2>おつかれさまでした！</h2>
        <p id="result-text">ぜんぶおぼえたよ！</p>
        <button class="btn-retry" id="btn-retry" onclick="restartGame();">もういちど</button>
    </div>

            { en: "there", rb: "ゼア", ja: "そこに、そこへ" },
            { en: "they", rb: "ゼイ", ja: "彼らは、それらは" },
            { en: "thing", rb: "シング", ja: "こと、もの" },
            { en: "thirteen", rb: "サーティーン", ja: "13" },
            { en: "this", rb: "ディス", ja: "これ、この" },
            { en: "three", rb: "スリー", ja: "3" },
            { en: "time", rb: "タイム", ja: "時間、時刻" },
            { en: "to", rb: "トゥー", ja: "〜へ、〜すること" },
            { en: "today", rb: "トゥデイ", ja: "今日、今日の" },
            { en: "town", rb: "タウン", ja: "町" },
            { en: "train", rb: "トレイン", ja: "電車" },
            { en: "tried", rb: "トライド", ja: "〜しようとした（tryの過去形）" },
            { en: "try", rb: "トライ", ja: "やってみる" },
            { en: "TV", rb: "ティーヴィー", ja: "テレビ" },
            { en: "up", rb: "アップ", ja: "上に" },
            { en: "us", rb: "アス", ja: "私たちを、私たちに" },
            { en: "very", rb: "ヴェリィ", ja: "とても" },
            { en: "visit", rb: "ヴィジット", ja: "訪れる" },
            { en: "visited", rb: "ヴィジティッド", ja: "訪れた（visit of過去形）" },
            { en: "walk", rb: "ウォーク", ja: "歩く、散歩する" },
            { en: "want", rb: "ウォント", ja: "欲しい、〜したい" },
            { en: "wanted", rb: "ウォンティッド", ja: "〜したかった（wantの過去形）" },
            { en: "was", rb: "ワズ", ja: "〜だった（am, isの過去形）" },
            { en: "wash", rb: "ウォッシュ", ja: "洗う" },
            { en: "watch", rb: "ウォッチ", ja: "見る" },
            { en: "water", rb: "ウォーター", ja: "水" },
            { en: "way", rb: "ウェイ", ja: "方法、道" },
            { en: "we", rb: "ウィー", ja: "私たちは" },
            { en: "wear", rb: "ウェア", ja: "着る、身につける" },
            { en: "well", rb: "ウェル", ja: "上手に、よく" },
            { en: "went", rb: "ウェント", ja: "行った（goの過去形）" },
            { en: "were", rb: "ウェア", ja: "〜だった（areの過去形）" },
            { en: "what", rb: "ワット", ja: "何、何が" },
            { en: "when", rb: "ウェン", ja: "〜のとき、いつ" },
            { en: "why", rb: "ワイ", ja: "なぜ、どうして" },
            { en: "will", rb: "ウィル", ja: "〜だろう、〜するつもりだ" },
            { en: "win", rb: "ウィン", ja: "勝つ" },
            { en: "with", rb: "ウィズ", ja: "〜と一緒に、〜を使って" },
            { en: "word", rb: "ワード", ja: "言葉、単語" },
            { en: "work", rb: "ワーク", ja: "仕事、働く" },
            { en: "would", rb: "ウッド", ja: "〜したいと思う(would like)" },
            { en: "wrestler", rb: "レスラー", ja: "レスラー、力士" },
            { en: "write", rb: "ライト", ja: "書く" },
            { en: "year", rb: "イヤー", ja: "年、1年" },
            { en: "you", rb: "ユー", ja: "あなた、あなたたち" },
            { en: "you'll", rb: "ユール", ja: "あなたは〜するだろう（you willの短縮形）" },
            { en: "your", rb: "ユア", ja: "あなたの" }
        ];

        var currentWords = [];
        var wrongWords = [];
        var currentIndex = 0;
        var isFlipped = false;
        var isTransitioning = false; // スマホ特有の連打バグ（強制フリーズ）を防ぐガード変数

        function initGame(wordsToUse) {
            currentWords = shuffle([].concat(wordsToUse));
            wrongWords = [];
            currentIndex = 0;
            isFlipped = false;
            isTransitioning = false;
            
            document.getElementById("game-screen").style.display = "flex";
            document.getElementById("result-screen").style.display = "none";
            showWord();
        }

        function shuffle(array) {
            for (var i = array.length - 1; i > 0; i--) {
                var j = Math.floor(Math.random() * (i + 1));
                var temp = array[i];
                array[i] = array[j];
                array[j] = temp;
            }
            return array;
        }

        function showWord() {
            if (currentIndex >= currentWords.length) {
                showResult();
                isTransitioning = false;
                return;
            }
            isFlipped = false;
            document.getElementById("card").className = "card";
            
            document.getElementById("progress").innerText = "のこり: " + (currentWords.length - currentIndex) + "問 / ぜんぶで: " + currentWords.length + "問";
            
            var frontWord = currentWords[currentIndex].en;
            var backRuby = currentWords[currentIndex].rb;
            var backMeaning = currentWords[currentIndex].ja;
            
            var wordElement = document.getElementById("ruby-area");
            
            // 英語の文字数に合わせて、絶対にカードからはみ出さないよう文字サイズを最適化
            if (frontWord.length > 12) {
                wordElement.style.fontSize = "16px";
            } else if (frontWord.length > 8) {
                wordElement.style.fontSize = "22px";
            } else {
                wordElement.style.fontSize = "32px";
            }
            
            // 表面は「英単語のスペルのみ」を配置
            wordElement.innerText = frontWord;
            
            // 【重要】カタカナ、確認スペル、日本語訳はすべて「解答用（裏面）」にセットしておく
            document.getElementById("rt-area-back").innerText = backRuby;
            document.getElementById("word-confirm-back").innerText = frontWord;
            document.getElementById("word-back").innerText = backMeaning;
            
            document.getElementById("btn-show").style.display = "block";
            document.getElementById("btn-yes").style.display = "none"; 
            document.getElementById("btn-no").style.display = "none";
        }

        function flipCard() {
            if (isFlipped || isTransitioning) return; 
            isFlipped = true;
            
            // 回転の適用
            document.getElementById("card").className = "card flipped";
            
            document.getElementById("btn-show").style.display = "none";
            document.getElementById("btn-yes").style.display = "block"; 
            document.getElementById("btn-no").style.display = "block";
        }

        function handleAnswer(isCorrect) {
            if (isTransitioning) return;
            isTransitioning = true; // 次の問題に移動中、ボタン入力を完全にロック

            if (!isCorrect) {
                wrongWords.push(currentWords[currentIndex]);
            }
            currentIndex++; 
            
            setTimeout(function() {
                showWord();
                isTransitioning = false; // 画面切り替えが完了したらロックを解除
            }, 200);
        }

        function showResult() {
            document.getElementById("game-screen").style.display = "none";
            document.getElementById("result-screen").style.display = "block";
            
            var resultText = document.getElementById("result-text");
            var retryBtn = document.getElementById("btn-retry");
            
            if (wrongWords.length === 0) {
                resultText.innerHTML = '<span style="color:#48bb78; font-size:24px; font-weight:bold;">すごーい！ぜんぶ合格！</span>';
                retryBtn.innerText = "もういちど はじめから遊ぶ";
            } else {
                resultText.innerHTML = "まちがえた単語が <span style='color:#f56565; font-size:20px; font-weight:bold;'>" + wrongWords.length + "問</span> あるよ。<br>もう一回やってみよう！";
                retryBtn.innerText = "まちがえた単語をふくしゅうする";
            }
        }

        function restartGame() {
            if (wrongWords.length === 0) {
                initGame(wordList);
            } else {
                initGame(wrongWords);
            }
        }

        // スマホで100%確実にタップを検出するイベントハンドラー設定
        document.getElementById("card").onclick = function() {
            flipCard();
        };
        document.getElementById("btn-show").onclick = function() {
            flipCard();
        };
        document.getElementById("btn-yes").onclick = function() {
            handleAnswer(true);
        };
        document.getElementById("btn-no").onclick = function() {
            handleAnswer(false);
        };
        document.getElementById("btn-retry").onclick = function() {
            restartGame();
        };

        // 初回スタート
        initGame(wordList);
    </script>
</body>
</html>
